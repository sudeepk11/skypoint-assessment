version: "3.9"

# Development override — Vite dev server with hot reload
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  db:
    image: postgres:15-alpine
    container_name: skypoint_db_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skypoint_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skypoint_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skypoint_backend_dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/skypoint_db
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skypoint_network
    restart: on-failure

  frontend:
    image: node:20-alpine
    container_name: skypoint_frontend_dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${APP_PORT:-3000}:5173"
    depends_on:
      - backend
    networks:
      - skypoint_network

volumes:
  postgres_data_dev:

networks:
  skypoint_network:
    driver: bridge
