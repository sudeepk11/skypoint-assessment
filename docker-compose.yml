version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: skypoint_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skypoint_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skypoint_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skypoint_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/skypoint_db
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - skypoint_network
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skypoint_frontend
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - skypoint_network
    restart: on-failure

volumes:
  postgres_data:

networks:
  skypoint_network:
    driver: bridge
